<!DOCTYPE html>
<html>
<head>
    <title>AI Task Planner</title>
</head>
<body>
    <h1>AI Task Planner</h1>

    <form method="POST">
        <label for="tasks">Enter your tasks (one or multiple tasks separated by commas or new lines):</label><br><br>
        <textarea name="tasks" rows="6" cols="60" placeholder="e.g. Finish report, Prepare slides, Buy groceries">{{ tasks }}</textarea><br><br>
        <input type="submit" value="Generate Final Plan">
    </form>

    {% if result %}
    <h2>Final Plan</h2>
    <pre>{{ result }}</pre>
    {% endif %}
</body>
</html>
