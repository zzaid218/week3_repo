<!DOCTYPE html>
<html>
<head>
    <title>AI Task Planner</title>
</head>
<body>

    <h1>AI Task Planner</h1>

    <form method="POST">
    <textarea name="tasks" rows="10" cols="50"
    placeholder="Enter tasks...">{{ tasks }}</textarea><br><br>
    <button type="submit">Run</button>
</form>

{% if result %}
    <h2>Final Plan</h2>
    <pre>{{ result }}</pre>
{% endif %}

</body>
</html>
